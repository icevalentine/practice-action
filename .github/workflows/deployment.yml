name: Deployment
on: push
jobs:
  lint:
    runs-on: windows-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v7
      - name: Install Node.jobs
        uses: actions/setup-node@v6
        with: 
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm lint
      - name: Run test
        run: npm test
      - name: Run build
        run: npm build